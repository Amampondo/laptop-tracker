<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>RecoverSoft Agent</title>
</head>
<body>
<script>
const API_URL = 'https://tracker-api-b3jc.onrender.com'

function postLocation(lat, lng, accuracy) {
  const token = localStorage.getItem('rs_token')
  if (!token) { console.log('No token yet'); return }
  fetch(API_URL + '/locations/', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': 'Bearer ' + token
    },
    body: JSON.stringify({
      latitude: lat,
      longitude: lng,
      accuracy_metres: accuracy,
      recorded_at: new Date().toISOString()
    })
  })
  .then(() => console.log('Location posted:', lat, lng, '±' + accuracy + 'm'))
  .catch(e => console.error('Post failed:', e))
}

function getLocation() {
  navigator.geolocation.getCurrentPosition(
    function(pos) {
      postLocation(pos.coords.latitude, pos.coords.longitude, pos.coords.accuracy)
    },
    function(err) { console.error('Location error:', err.message) },
    { enableHighAccuracy: true, timeout: 15000, maximumAge: 30000 }
  )
}

// Start immediately then every 30 seconds
getLocation()
setInterval(getLocation, 30000)

// Wake lock
navigator.wakeLock?.request('screen').catch(() => {})
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') {
    navigator.wakeLock?.request('screen').catch(() => {})
  }
})
</script>
</body>
</html>
