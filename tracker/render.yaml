services:
  # ── Backend API ──────────────────────────────────────────────────────────────
  - type: web
    name: tracker-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: tracker-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true  # Render auto-generates a secure random value
      - key: PYTHON_VERSION
        value: "3.11.0"

  # ── React Dashboard (static site) ────────────────────────────────────────────
  - type: web
    name: tracker-web
    runtime: static
    rootDir: dashboard
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html  # SPA fallback
    envVars:
      - key: VITE_API_URL
        fromService:
          name: tracker-api
          type: web
          property: host

databases:
  # ── Managed PostgreSQL ────────────────────────────────────────────────────────
  - name: tracker-db
    plan: starter
    postgresMajorVersion: 16
    # PostGIS extension must be enabled once after first deploy:
    # Run in Render shell: psql $DATABASE_URL -c "CREATE EXTENSION IF NOT EXISTS postgis;"
