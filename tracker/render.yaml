services:
  - type: web
    name: tracker-api
    runtime: python
    rootDir: tracker/backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: tracker-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: "3.11.0"

  - type: web
    name: tracker-web
    runtime: static
    rootDir: tracker/dashboard
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://tracker-api-b3jc.onrender.com

databases:
  - name: tracker-db
    plan: basic-256mb
    postgresMajorVersion: 16
