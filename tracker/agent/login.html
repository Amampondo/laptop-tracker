<!DOCTYPE html>
<html>
<head>
    <style>
        body { background: #0f1117; color: white; font-family: sans-serif; text-align: center; padding: 20px; }
        #secured-msg { display: none; margin-top: 50%; color: #3b82f6; font-weight: bold; letter-spacing: 1px; }
        .input-group { margin-bottom: 10px; }
        input { width: 80%; padding: 10px; background: #1a1d27; border: 1px solid #2a2d3a; color: white; }
        button { width: 85%; padding: 10px; background: #3b82f6; border: none; color: white; cursor: pointer; }
    </style>
</head>
<body>
    <div id="auth-form">
        <h2>RecoverSoft</h2>
        <div class="input-group"><input type="email" id="email" placeholder="Email"></div>
        <div class="input-group"><input type="password" id="pass" placeholder="Password"></div>
        <button onclick="doLogin()">Sign In</button>
    </div>

    <div id="secured-msg">SECURED BY RECOVERSOFT</div>

    <script>
        async function doLogin() {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('pass').value;
            try {
                await window.tracker.login(email, pass);
            } catch (e) { alert(e.message); }
        }

        window.tracker.onAuthSuccess(() => {
            document.getElementById('auth-form').style.display = 'none';
            document.getElementById('secured-msg').style.display = 'block';
        });
    </script>
</body>
</html>
