<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'unsafe-inline'">
  <title>Laptop Tracker</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: system-ui, sans-serif; }
    body { background: #f5f5f4; display: flex; align-items: center; justify-content: center; height: 100vh; }
    .card { background: #fff; border-radius: 12px; padding: 36px; width: 320px; }
    h1 { font-size: 20px; font-weight: 500; margin-bottom: 6px; }
    p { color: #888; font-size: 13px; margin-bottom: 24px; }
    label { display: block; font-size: 13px; color: #555; margin-bottom: 4px; }
    input { width: 100%; padding: 9px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; margin-bottom: 14px; }
    button { width: 100%; padding: 10px; background: #1D9E75; color: #fff; border: none; border-radius: 8px; font-size: 15px; cursor: pointer; font-weight: 500; }
    button:disabled { opacity: 0.6; cursor: default; }
    .error { color: #dc2626; font-size: 13px; margin-bottom: 12px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Laptop Tracker</h1>
    <p>Sign in to start tracking this device</p>
    <label>Email</label>
    <input type="email" id="email" placeholder="you@example.com">
    <label>Password</label>
    <input type="password" id="password">
    <div class="error" id="error"></div>
    <button id="btn" onclick="handleLogin()">Sign in</button>
  </div>
  <script>
    async function handleLogin() {
      const email = document.getElementById('email').value
      const password = document.getElementById('password').value
      const btn = document.getElementById('btn')
      const err = document.getElementById('error')
      err.textContent = ''
      btn.disabled = true
      btn.textContent = 'Signing in…'
      try {
        await window.tracker.login(email, password)
      } catch (e) {
        err.textContent = 'Invalid email or password'
        btn.disabled = false
        btn.textContent = 'Sign in'
      }
    }
  </script>
</body>
</html>
